name: Release mcp-proxy

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcp-proxy-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mcp-proxy-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mcp-proxy-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: mcp-proxy-linux-aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: mcp-proxy
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          mkdir -p dist
          cp "mcp-proxy/target/${{ matrix.target }}/release/mcp-proxy" dist/
          tar -czf "${{ matrix.artifact }}.tar.gz" -C dist mcp-proxy

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true

  publish-sqreen:
    name: Sync binaries to sqreen.ai
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger enterprise CDN sync
        env:
          GH_TOKEN: ${{ secrets.SQREEN_ENTERPRISE_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ -z "${GH_TOKEN}" ]; then
            echo "SQREEN_ENTERPRISE_PAT not set — skip auto-sync."
            echo "Run publish-proxy-release in sqreen-ai/sqreen-enterprise with version=${VERSION}"
            exit 0
          fi
          gh workflow run publish-proxy-release.yml \
            --repo sqreen-ai/sqreen-enterprise \
            -f "version=${VERSION}"
